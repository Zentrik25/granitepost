<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="stone" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4a4a4a"/>
      <stop offset="40%" stop-color="#3a3a3a"/>
      <stop offset="100%" stop-color="#252525"/>
    </linearGradient>
    <filter id="grain" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.75" numOctaves="4"
                    stitchTiles="stitch" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="gray"/>
      <feBlend in="SourceGraphic" in2="gray" mode="soft-light" result="blend"/>
      <feComposite in="blend" in2="SourceGraphic" operator="in"/>
    </filter>
    <clipPath id="round">
      <rect width="64" height="64" rx="10"/>
    </clipPath>
  </defs>

  <!-- Base stone background -->
  <rect width="64" height="64" rx="10" fill="url(#stone)"/>

  <!-- Granite grain texture overlay -->
  <rect width="64" height="64" rx="10" fill="url(#stone)" filter="url(#grain)" opacity="0.4"/>

  <!-- Subtle highlight vein -->
  <line x1="10" y1="18" x2="38" y2="12" stroke="#666" stroke-width="0.5" opacity="0.4"/>
  <line x1="26" y1="52" x2="58" y2="44" stroke="#555" stroke-width="0.4" opacity="0.3"/>

  <!-- Red news accent bar -->
  <rect x="0" y="54" width="64" height="10" rx="0" fill="#c0392b" clip-path="url(#round)"/>
  <rect x="0" y="54" width="64" height="10" fill="#c0392b" clip-path="url(#round)"/>

  <!-- Bottom bar rounded fix -->
  <rect x="0" y="57" width="64" height="7" fill="#c0392b"/>
  <rect x="0" y="57" width="64" height="10" rx="0" fill="#c0392b"
        clip-path="url(#round)"/>

  <!-- Bold serif G -->
  <text x="32" y="48"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="42"
        font-weight="700"
        text-anchor="middle"
        fill="#f0ede8"
        letter-spacing="-1">G</text>

  <!-- Thin rule under G, above red bar -->
  <line x1="12" y1="52" x2="52" y2="52" stroke="#888" stroke-width="0.75" opacity="0.6"/>
</svg>
